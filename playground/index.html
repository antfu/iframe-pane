<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iframe-pane playground</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      color: #ddd;
      background: #111;
    }
    header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px;
      border-bottom: 1px solid #333;
      flex-wrap: wrap;
    }
    button {
      background: #222;
      color: #ddd;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 6px 12px;
      cursor: pointer;
    }
    button:hover { background: #333; }
    button.active { background: #144d34; border-color: #1fa669; }
    main {
      flex: 1;
      display: flex;
      min-height: 0;
    }
    #sidebar {
      width: 260px;
      min-width: 120px;
      max-width: 60vw;
      padding: 12px;
      font-size: 12px;
      overflow: auto;
    }
    #sidebar pre {
      white-space: pre-wrap;
      color: #8f8;
    }
    #splitter {
      width: 6px;
      cursor: ew-resize;
      background: #333;
      flex-shrink: 0;
    }
    #splitter:hover, #splitter.dragging { background: #1fa669; }
    #stage-wrapper {
      flex: 1;
      padding: 16px;
      min-width: 0;
    }
    #stage {
      width: 100%;
      height: 100%;
      border: 1px dashed #555;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
    }
  </style>
</head>
<body>
  <header>
    <strong>iframe-pane</strong>
    <span id="tab-buttons"></span>
    <button id="btn-unmount">Unmount</button>
    <button id="btn-hide">Hide/Show</button>
    <button id="btn-dispose">Dispose active</button>
    <button id="btn-lru">maxPanes = 2</button>
  </header>
  <main>
    <div id="sidebar">
      <p>Drag the splitter — panes get <code>pointer-events: none</code> while dragging (via <code>lockPointerEvents</code>), and resize with the stage.</p>
      <p>Each page has a counter + input. Switch tabs and come back: state is preserved.</p>
      <pre id="status"></pre>
    </div>
    <div id="splitter"></div>
    <div id="stage-wrapper">
      <div id="stage">select a tab to mount an iframe pane here</div>
    </div>
  </main>
  <script type="module" src="./main.ts"></script>
</body>
</html>
